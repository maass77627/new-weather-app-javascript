<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
 rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="nav"> hello world <button>add</button>   <button>hello</button></nav>
    <h1>Weather Application</h1>
     <button id="toggle-saved-btn" class="toggle-saved-btn">Saved Cities</button>
    
    <form class="search-form" id="search-form">
        <input type="text" id="city-search" placeholder="city-search" type="text"></input>
       <button type="submit" id="submit" class="submit">Submit</button>
    </form>
   
    <div id="weather-info" class="weather-info">
        <button id="save-city-btn">
    <i class="fa-solid fa-bookmark"></i>
    </button>
    <h3 id="weather-info-title" class="weather-info-title"></h3>
    <h2 id="weather-info-temp" class="weather-info-temp"></h2>
    <p id="weather-info-desc" class="weather-info-desc"></p>
    <p id="weather-info-high" class="weather-info-high"></p>
    </div>

    <!-- <button id="save-city-btn">
    <i class="fa-solid fa-bookmark"></i>
    </button> -->

    <div id="weather-now" class="weather-now">
      

    </div>

    <div class="forecast" id="forecast">
       <p>10-day Forecast</p>
    </div>

    <div class="air-quality" id="air-quality">
        <p>Air Quality</p>
       <p id="air-num" class="air-num"></p>
       <p id="air-word" class="air-word"></p>
       <div id="temp-bar-two" class="temp-bar-two">
        <div id="temp-bar-two-fill" class="temp-bar-two-fill">
            <div class="marker" id="marker"></div>
        </div>
       </div>

        <p id="air-sent" class="air-sent">

        </p>
       
    </div>

    <!-- <button id="toggle-saved-btn" class="toggle-saved-btn">Saved Cities</button> -->

    <div id="saved-wrapper" class="saved-wrapper hidden">
        <div id="saved-container" class="saved-container">

        </div>

    </div>



    <script src="script.js"></script>
</body>
</html>
